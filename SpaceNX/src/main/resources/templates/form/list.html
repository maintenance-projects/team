<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>양식</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">양식 템플릿</h1>
            <a th:href="@{/spaces/{key}/forms/new(key=${currentSpace.spaceKey})}" class="btn btn-primary">
                <i class="fas fa-upload"></i> 양식 업로드
            </a>
        </div>

        <div class="auth-alert auth-alert-success" th:if="${success}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}">성공</span>
        </div>

        <div class="auth-alert auth-alert-error" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">오류</span>
        </div>

        <!-- Forms list -->
        <div class="forms-grid" th:if="${forms != null and !#lists.isEmpty(forms)}">
            <div class="section-card form-card" th:each="form : ${forms}">
                <div class="section-card-body">
                    <div class="form-card-header">
                        <div class="form-card-icon">
                            <i class="fas" th:classappend="${form.fileIcon}"></i>
                        </div>
                        <div class="form-card-status">
                            <span class="status-indicator"
                                  th:classappend="${form.active} ? 'status-indicator-active' : 'status-indicator-inactive'"
                                  th:text="${form.active} ? '활성' : '비활성'">활성</span>
                        </div>
                    </div>
                    <h3 class="form-card-name" th:text="${form.name}">양식 이름</h3>
                    <p class="form-card-description" th:text="${form.description}">양식 설명이 여기에 표시됩니다...</p>
                    <div class="form-card-meta" style="margin-bottom: 0.75rem; font-size: 0.85rem; color: var(--text-secondary, #6b7280);">
                        <span><i class="fas fa-file"></i> <span th:text="${form.originalFilename}">file.pdf</span></span>
                        <span style="margin-left: 1rem;"><i class="fas fa-weight-hanging"></i> <span th:text="${form.fileSizeFormatted}">1.2 MB</span></span>
                        <span style="margin-left: 1rem;"><i class="fas fa-user"></i> <span th:text="${form.uploader.username}">user</span></span>
                    </div>
                    <div class="form-card-actions">
                        <a th:href="@{/spaces/{key}/forms/{formId}(key=${currentSpace.spaceKey}, formId=${form.id})}"
                           class="btn btn-secondary btn-sm">
                            <i class="fas fa-eye"></i> 상세
                        </a>
                        <a th:href="@{/spaces/{key}/forms/{formId}/download(key=${currentSpace.spaceKey}, formId=${form.id})}"
                           class="btn btn-primary btn-sm">
                            <i class="fas fa-download"></i> 다운로드
                        </a>
                        <form th:action="@{/spaces/{key}/forms/{formId}/delete(key=${currentSpace.spaceKey}, formId=${form.id})}"
                              method="post" style="display: inline;"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i> 삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:unless="${forms != null and !#lists.isEmpty(forms)}">
            <div class="empty-state-icon">
                <i class="fas fa-file-lines"></i>
            </div>
            <h2 class="empty-state-title">아직 양식이 없습니다</h2>
            <p class="empty-state-text">파일 양식을 업로드하여 팀원들과 공유하세요.</p>
            <a th:href="@{/spaces/{key}/forms/new(key=${currentSpace.spaceKey})}" class="btn btn-primary">
                <i class="fas fa-upload"></i> 양식 업로드
            </a>
        </div>
    </div>
</body>
</html>
