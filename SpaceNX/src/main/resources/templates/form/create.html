<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>양식 업로드</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">양식 템플릿 업로드</h1>
        </div>

        <div class="form-card">
            <form th:action="@{/spaces/{key}/forms(key=${currentSpace.spaceKey})}" method="post"
                  enctype="multipart/form-data"
                  th:object="${createFormTemplateRequest}" class="form-standard">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="auth-alert auth-alert-error" th:if="${error}">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}">오류가 발생했습니다.</span>
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">양식 이름 <span class="required">*</span></label>
                    <input type="text" id="name" th:field="*{name}" class="form-control"
                           placeholder="예: 휴가 신청서, 출장 보고서" required>
                    <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 오류</span>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">설명</label>
                    <textarea id="description" th:field="*{description}" class="form-control form-textarea"
                              placeholder="이 양식의 용도를 설명하세요..." rows="3"></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">설명 오류</span>
                </div>

                <div class="form-group">
                    <label for="file" class="form-label">양식 파일 <span class="required">*</span></label>
                    <input type="file" id="file" name="file" class="form-control" required
                           accept=".pdf,.hwp,.doc,.docx,.xls,.xlsx,.ppt,.pptx">
                    <span class="form-hint">허용 파일 형식: PDF, HWP, DOC, DOCX, XLS, XLSX, PPT, PPTX</span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/spaces/{key}/forms(key=${currentSpace.spaceKey})}" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload"></i> 업로드
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
