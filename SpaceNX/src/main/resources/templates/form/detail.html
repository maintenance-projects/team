<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>양식 상세</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title" th:text="${formTemplate.name}">양식 이름</h1>
            <a th:href="@{/spaces/{key}/forms(key=${currentSpace.spaceKey})}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 목록으로
            </a>
        </div>

        <div class="section-card">
            <div class="section-card-body">
                <table class="detail-table" style="width: 100%; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; width: 150px; color: var(--text-secondary, #6b7280);">양식 이름</th>
                        <td style="padding: 0.75rem;" th:text="${formTemplate.name}">양식 이름</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">설명</th>
                        <td style="padding: 0.75rem;" th:text="${formTemplate.description ?: '-'}">설명</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">파일명</th>
                        <td style="padding: 0.75rem;">
                            <i class="fas" th:classappend="${formTemplate.fileIcon}"></i>
                            <span th:text="${formTemplate.originalFilename}">file.pdf</span>
                        </td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">파일 크기</th>
                        <td style="padding: 0.75rem;" th:text="${formTemplate.fileSizeFormatted}">1.2 MB</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">업로더</th>
                        <td style="padding: 0.75rem;" th:text="${formTemplate.uploader.username}">user</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-color, #e5e7eb);">
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">업로드일</th>
                        <td style="padding: 0.75rem;" th:text="${#temporals.format(formTemplate.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                    </tr>
                    <tr>
                        <th style="padding: 0.75rem; text-align: left; color: var(--text-secondary, #6b7280);">상태</th>
                        <td style="padding: 0.75rem;">
                            <span class="status-indicator"
                                  th:classappend="${formTemplate.active} ? 'status-indicator-active' : 'status-indicator-inactive'"
                                  th:text="${formTemplate.active} ? '활성' : '비활성'">활성</span>
                        </td>
                    </tr>
                </table>

                <div class="form-actions" style="margin-top: 1.5rem;">
                    <a th:href="@{/spaces/{key}/forms/{formId}/download(key=${currentSpace.spaceKey}, formId=${formTemplate.id})}"
                       class="btn btn-primary">
                        <i class="fas fa-download"></i> 다운로드
                    </a>
                    <form th:action="@{/spaces/{key}/forms/{formId}/delete(key=${currentSpace.spaceKey}, formId=${formTemplate.id})}"
                          method="post" style="display: inline;"
                          onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> 삭제
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
