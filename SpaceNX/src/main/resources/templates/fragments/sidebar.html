<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <aside class="sidebar" th:fragment="sidebar">
        <div class="sidebar-brand">
            <a th:href="@{/dashboard}" class="brand-link">
                <i class="fas fa-rocket brand-icon"></i>
                <span class="brand-text">SpaceNX</span>
            </a>
        </div>

        <!-- Space navigation (shown when inside a space) -->
        <div th:if="${currentSpace != null}" class="sidebar-space-nav">
            <div class="space-header">
                <div class="space-icon">
                    <span th:text="${currentSpace.name != null and currentSpace.name != '' ? #strings.substring(currentSpace.name, 0, 1).toUpperCase() : '?'}">S</span>
                </div>
                <div class="space-info">
                    <span class="space-name" th:text="${currentSpace.name}">Space Name</span>
                    <span class="space-type-badge"
                          th:if="${currentSpace.spaceType != null}"
                          th:text="${currentSpace.spaceType}"
                          th:classappend="${currentSpace.spaceType.name() == 'SCRUM'} ? 'badge-scrum' : 'badge-kanban'">SCRUM</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/summary(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'summary'} ? 'active'">
                            <i class="fas fa-chart-pie nav-icon"></i>
                            <span>요약</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/issues(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'list'} ? 'active'">
                            <i class="fas fa-list nav-icon"></i>
                            <span>목록</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/board(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'board'} ? 'active'">
                            <i class="fas fa-columns nav-icon"></i>
                            <span>보드</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/calendar(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'calendar'} ? 'active'">
                            <i class="fas fa-calendar nav-icon"></i>
                            <span>캘린더</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/timeline(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'timeline'} ? 'active'">
                            <i class="fas fa-bars-progress nav-icon"></i>
                            <span>타임라인</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/backlog(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'backlog'} ? 'active'">
                            <i class="fas fa-layer-group nav-icon"></i>
                            <span>백로그</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/forms(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'forms'} ? 'active'">
                            <i class="fas fa-file-lines nav-icon"></i>
                            <span>양식</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/reports(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'reports'} ? 'active'">
                            <i class="fas fa-chart-bar nav-icon"></i>
                            <span>보고서</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/code(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'code'} ? 'active'">
                            <i class="fas fa-code nav-icon"></i>
                            <span>코드</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces/{key}/shortcuts(key=${currentSpace.spaceKey})}"
                           class="nav-link"
                           th:classappend="${activeTab == 'shortcuts'} ? 'active'">
                            <i class="fas fa-link nav-icon"></i>
                            <span>바로가기</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-divider"></div>

            <div class="sidebar-space-actions">
                <a th:href="@{/spaces/{key}/settings(key=${currentSpace.spaceKey})}"
                   class="nav-link"
                   th:classappend="${activeTab == 'settings'} ? 'active'">
                    <i class="fas fa-cog nav-icon"></i>
                    <span>스페이스 설정</span>
                </a>
            </div>
        </div>

        <!-- Global navigation (shown when not inside a space) -->
        <div th:unless="${currentSpace != null}" class="sidebar-global-nav">
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a th:href="@{/dashboard}" class="nav-link"
                           th:classappend="${activeTab == 'dashboard'} ? 'active'">
                            <i class="fas fa-th-large nav-icon"></i>
                            <span>대시보드</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/spaces}" class="nav-link"
                           th:classappend="${activeTab == 'spaces'} ? 'active'">
                            <i class="fas fa-folder nav-icon"></i>
                            <span>모든 스페이스</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-create">
                <a th:href="@{/spaces/create}" class="btn btn-primary btn-block">
                    <i class="fas fa-plus"></i> 스페이스 만들기
                </a>
            </div>
        </div>

        <!-- Sidebar footer -->
        <div class="sidebar-footer" sec:authorize="isAuthenticated()">
            <div class="sidebar-user">
                <div class="user-avatar-small">
                    <span sec:authentication="principal.username"
                          th:text="${#strings.substring(#authentication.principal.username, 0, 1).toUpperCase()}">U</span>
                </div>
                <span class="sidebar-username" sec:authentication="principal.username">User</span>
            </div>
            <a th:href="@{/settings}" class="sidebar-settings-btn" title="설정">
                <i class="fas fa-cog"></i>
            </a>
        </div>
    </aside>
</body>
</html>
