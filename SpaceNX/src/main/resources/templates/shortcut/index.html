<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>바로가기</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">바로가기</h1>
            <button class="btn btn-primary" id="addShortcutBtn" onclick="toggleAddShortcutForm()">
                <i class="fas fa-plus"></i> 바로가기 추가
            </button>
        </div>

        <!-- Add shortcut form (hidden by default) -->
        <div class="section-card" id="addShortcutForm" style="display: none;">
            <div class="section-card-header">
                <h2 class="section-title">새 바로가기 추가</h2>
            </div>
            <div class="section-card-body">
                <form th:action="@{/spaces/{key}/shortcuts(key=${currentSpace.spaceKey})}" method="post" class="form-standard">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="shortcutName" class="form-label">이름 <span class="required">*</span></label>
                            <input type="text" id="shortcutName" name="name" class="form-control"
                                   placeholder="예: 디자인 시스템" required>
                        </div>
                        <div class="form-group form-group-half">
                            <label for="shortcutUrl" class="form-label">URL <span class="required">*</span></label>
                            <input type="url" id="shortcutUrl" name="url" class="form-control"
                                   placeholder="https://example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="shortcutDescription" class="form-label">설명</label>
                        <input type="text" id="shortcutDescription" name="description" class="form-control"
                               placeholder="이 링크에 대한 간단한 설명...">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="toggleAddShortcutForm()">취소</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-plus"></i> 바로가기 추가
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Shortcuts grid -->
        <div class="shortcuts-grid" th:if="${shortcuts != null and !#lists.isEmpty(shortcuts)}">
            <div class="shortcut-card" th:each="shortcut : ${shortcuts}">
                <div class="shortcut-card-header">
                    <div class="shortcut-card-icon">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                    <form th:action="@{/spaces/{key}/shortcuts/{shortcutId}(key=${currentSpace.spaceKey}, shortcutId=${shortcut.id})}"
                          method="post" class="shortcut-delete-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="_method" value="DELETE">
                        <button type="submit" class="btn-icon btn-icon-danger" title="바로가기 삭제"
                                onclick="return confirm('이 바로가기를 삭제하시겠습니까?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
                <h3 class="shortcut-card-name">
                    <a th:href="${shortcut.url}" target="_blank" rel="noopener noreferrer"
                       th:text="${shortcut.name}">바로가기 이름</a>
                </h3>
                <p class="shortcut-card-description" th:if="${shortcut.description != null}"
                   th:text="${shortcut.description}">설명</p>
                <div class="shortcut-card-url">
                    <i class="fas fa-link"></i>
                    <a th:href="${shortcut.url}" target="_blank" rel="noopener noreferrer"
                       class="shortcut-url-text" th:text="${shortcut.url}">https://example.com</a>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:unless="${shortcuts != null and !#lists.isEmpty(shortcuts)}">
            <div class="empty-state-icon">
                <i class="fas fa-link"></i>
            </div>
            <h2 class="empty-state-title">아직 바로가기가 없습니다</h2>
            <p class="empty-state-text">자주 사용하는 외부 링크를 추가하세요.</p>
            <button class="btn btn-primary" onclick="toggleAddShortcutForm()">
                <i class="fas fa-plus"></i> 첫 번째 바로가기 추가
            </button>
        </div>
    </div>

    <div layout:fragment="scripts">
        <script>
            function toggleAddShortcutForm() {
                var form = document.getElementById('addShortcutForm');
                form.style.display = form.style.display === 'none' ? 'block' : 'none';
            }
        </script>
    </div>
</body>
</html>
