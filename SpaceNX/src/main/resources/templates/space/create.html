<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>스페이스 만들기</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">새 스페이스 만들기</h1>
        </div>

        <div class="form-card">
            <form th:action="@{/spaces}" method="post" th:object="${createSpaceRequest}" class="form-standard">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="auth-alert auth-alert-error" th:if="${error}">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}">오류가 발생했습니다.</span>
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">스페이스 이름 <span class="required">*</span></label>
                    <input type="text" id="name" th:field="*{name}" class="form-control"
                           placeholder="예: 나의 멋진 프로젝트" required>
                    <span class="form-hint">프로젝트 스페이스에 설명적인 이름을 선택하세요.</span>
                    <span class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">이름 오류</span>
                </div>

                <div class="form-group">
                    <label for="spaceKey" class="form-label">스페이스 키 <span class="required">*</span></label>
                    <input type="text" id="spaceKey" th:field="*{spaceKey}" class="form-control"
                           placeholder="예: MAP" required maxlength="10"
                           style="text-transform: uppercase;">
                    <span class="form-hint">업무 식별에 사용되는 고유 키입니다 (예: MAP-1, MAP-2). 최대 10자.</span>
                    <span class="form-error" th:if="${#fields.hasErrors('spaceKey')}" th:errors="*{spaceKey}">키 오류</span>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">설명</label>
                    <textarea id="description" th:field="*{description}" class="form-control form-textarea"
                              placeholder="이 스페이스에 대해 설명해주세요..." rows="4"></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">설명 오류</span>
                </div>

                <div class="form-group">
                    <label class="form-label">스페이스 유형 <span class="required">*</span></label>
                    <div class="radio-card-group">
                        <label class="radio-card">
                            <input type="radio" th:field="*{spaceType}" value="SCRUM" class="radio-card-input">
                            <div class="radio-card-content">
                                <div class="radio-card-icon">
                                    <i class="fas fa-running"></i>
                                </div>
                                <div class="radio-card-info">
                                    <span class="radio-card-title">스크럼</span>
                                    <span class="radio-card-desc">스프린트 단위로 작업을 관리합니다. 백로그, 스프린트 계획, 속도 추적을 지원합니다.</span>
                                </div>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" th:field="*{spaceType}" value="KANBAN" class="radio-card-input">
                            <div class="radio-card-content">
                                <div class="radio-card-icon">
                                    <i class="fas fa-columns"></i>
                                </div>
                                <div class="radio-card-info">
                                    <span class="radio-card-title">칸반</span>
                                    <span class="radio-card-desc">보드에서 작업을 시각화하여 지속적인 흐름을 관리합니다. 스프린트가 필요 없습니다.</span>
                                </div>
                            </div>
                        </label>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('spaceType')}" th:errors="*{spaceType}">유형 오류</span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/dashboard}" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 스페이스 만들기
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div layout:fragment="scripts">
        <script>
            // Auto-generate space key from name
            document.getElementById('name').addEventListener('input', function() {
                const keyField = document.getElementById('spaceKey');
                if (!keyField.dataset.manuallyEdited) {
                    const key = this.value
                        .replace(/[^a-zA-Z0-9\s]/g, '')
                        .split(/\s+/)
                        .map(w => w.charAt(0))
                        .join('')
                        .toUpperCase()
                        .substring(0, 10);
                    keyField.value = key;
                }
            });

            document.getElementById('spaceKey').addEventListener('input', function() {
                this.dataset.manuallyEdited = 'true';
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            });
        </script>
    </div>
</body>
</html>
