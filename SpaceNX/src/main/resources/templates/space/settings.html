<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>스페이스 설정</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">스페이스 설정</h1>
        </div>

        <div class="settings-layout">
            <!-- Space info form -->
            <div class="section-card">
                <div class="section-card-header">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i> 일반 설정
                    </h2>
                </div>
                <div class="section-card-body">
                    <div class="auth-alert auth-alert-success" th:if="${successMessage}">
                        <i class="fas fa-check-circle"></i>
                        <span th:text="${successMessage}">설정이 저장되었습니다.</span>
                    </div>

                    <div class="auth-alert auth-alert-error" th:if="${error}">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:text="${error}">오류가 발생했습니다.</span>
                    </div>

                    <form th:action="@{/spaces/{key}/settings(key=${currentSpace.spaceKey})}" method="post"
                          th:object="${spaceSettingsRequest}" class="form-standard">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label for="name" class="form-label">스페이스 이름</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="spaceKey" class="form-label">스페이스 키</label>
                            <input type="text" id="spaceKey" th:field="*{spaceKey}" class="form-control" readonly disabled>
                            <span class="form-hint">스페이스 키는 생성 후 변경할 수 없습니다.</span>
                        </div>

                        <div class="form-group">
                            <label for="description" class="form-label">설명</label>
                            <textarea id="description" th:field="*{description}" class="form-control form-textarea" rows="4"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> 변경사항 저장
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Members management -->
            <div class="section-card">
                <div class="section-card-header">
                    <h2 class="section-title">
                        <i class="fas fa-users"></i> 멤버
                    </h2>
                </div>
                <div class="section-card-body">
                    <!-- Add member form -->
                    <form th:action="@{/spaces/{key}/members(key=${currentSpace.spaceKey})}" method="post"
                          class="add-member-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="form-row">
                            <div class="form-group form-group-grow">
                                <input type="text" name="username" class="form-control"
                                       placeholder="추가할 사용자 이름을 입력하세요..." required>
                            </div>
                            <div class="form-group">
                                <select name="role" class="form-control form-select">
                                    <option value="MEMBER">멤버</option>
                                    <option value="ADMIN">관리자</option>
                                    <option value="VIEWER">뷰어</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-user-plus"></i> 추가
                                </button>
                            </div>
                        </div>
                    </form>

                    <!-- Members list -->
                    <div class="members-table-wrapper" th:if="${members != null and !#lists.isEmpty(members)}">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>멤버</th>
                                    <th>역할</th>
                                    <th>참여일</th>
                                    <th>작업</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="member : ${members}">
                                    <td>
                                        <div class="table-user">
                                            <div class="member-avatar">
                                                <span th:with="aName=${member.user.displayName != null and member.user.displayName != '' ? member.user.displayName : member.user.username}" th:text="${aName != null and aName != '' ? #strings.substring(aName, 0, 1).toUpperCase() : '?'}">U</span>
                                            </div>
                                            <div class="table-user-info">
                                                <span class="table-user-name" th:text="${member.user.displayName != null and member.user.displayName != ''} ? ${member.user.displayName} : ${member.user.username}">User Name</span>
                                                <span class="table-user-username" th:text="'@' + ${member.user.username}">@username</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="role-badge" th:classappend="'role-' + ${#strings.toLowerCase(member.role.name())}"
                                              th:text="${member.role}">MEMBER</span>
                                    </td>
                                    <td>
                                        <span th:text="${member.createdAt != null} ? ${#temporals.format(member.createdAt, 'yyyy-MM-dd')} : '-'">2025-01-01</span>
                                    </td>
                                    <td>
                                        <div class="table-actions" th:if="${member.role.name() != 'OWNER'}">
                                            <form th:action="@{/spaces/{key}/members/{memberId}(key=${currentSpace.spaceKey}, memberId=${member.id})}"
                                                  method="post" class="inline-form">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <input type="hidden" name="_method" value="DELETE">
                                                <button type="submit" class="btn btn-danger btn-sm"
                                                        onclick="return confirm('이 멤버를 제거하시겠습니까?')">
                                                    <i class="fas fa-user-minus"></i> 제거
                                                </button>
                                            </form>
                                        </div>
                                        <span th:if="${member.role.name() == 'OWNER'}" class="text-muted">소유자</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="empty-state-inline" th:unless="${members != null and !#lists.isEmpty(members)}">
                        <p>멤버를 찾을 수 없습니다.</p>
                    </div>
                </div>
            </div>

            <!-- Danger zone -->
            <div class="section-card section-card-danger">
                <div class="section-card-header">
                    <h2 class="section-title">
                        <i class="fas fa-exclamation-triangle"></i> 위험 구역
                    </h2>
                </div>
                <div class="section-card-body">
                    <div class="danger-action">
                        <div class="danger-action-info">
                            <h3>스페이스 삭제</h3>
                            <p>스페이스를 삭제하면 모든 업무, 스프린트 및 데이터가 영구적으로 제거됩니다. 이 작업은 되돌릴 수 없습니다.</p>
                        </div>
                        <form th:action="@{/spaces/{key}(key=${currentSpace.spaceKey})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('정말로 이 스페이스를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                                <i class="fas fa-trash"></i> 스페이스 삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
