<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>설정</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h1 class="page-title">계정 설정</h1>
        </div>

        <div class="settings-layout">
            <div class="auth-alert auth-alert-success" th:if="${success}">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}">성공</span>
            </div>

            <div class="auth-alert auth-alert-error" th:if="${error}">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">오류</span>
            </div>

            <!-- Profile settings -->
            <div class="section-card">
                <div class="section-card-header">
                    <h2 class="section-title">
                        <i class="fas fa-user"></i> 프로필
                    </h2>
                </div>
                <div class="section-card-body">
                    <form th:action="@{/settings/profile}" method="post" class="form-standard">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label for="username" class="form-label">사용자명</label>
                            <input type="text" id="username" th:value="${user.username}" class="form-control" readonly disabled>
                            <span class="form-hint">사용자명은 변경할 수 없습니다.</span>
                        </div>

                        <div class="form-group">
                            <label for="displayName" class="form-label">표시 이름</label>
                            <input type="text" id="displayName" name="displayName" th:value="${user.displayName}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">이메일</label>
                            <input type="email" id="email" name="email" th:value="${user.email}" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="bio" class="form-label">소개</label>
                            <textarea id="bio" name="bio" class="form-control form-textarea" rows="3"
                                      th:text="${user.bio}"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> 프로필 저장
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Password change -->
            <div class="section-card">
                <div class="section-card-header">
                    <h2 class="section-title">
                        <i class="fas fa-lock"></i> 비밀번호 변경
                    </h2>
                </div>
                <div class="section-card-body">
                    <form th:action="@{/settings/password}" method="post" class="form-standard">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label for="currentPassword" class="form-label">현재 비밀번호</label>
                            <input type="password" id="currentPassword" name="currentPassword" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="newPassword" class="form-label">새 비밀번호</label>
                            <input type="password" id="newPassword" name="newPassword" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">새 비밀번호 확인</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-key"></i> 비밀번호 변경
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
