<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - SpaceNX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <i class="fas fa-rocket auth-brand-icon"></i>
                    <h1 class="auth-brand-text">SpaceNX</h1>
                </div>
                <p class="auth-subtitle">계정을 만드세요</p>
            </div>

            <div class="auth-alert auth-alert-error" th:if="${error}">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">오류가 발생했습니다.</span>
            </div>

            <form th:action="@{/register}" method="post" class="auth-form" th:object="${registerRequest}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username" class="form-label">사용자명</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" th:field="*{username}" class="form-control"
                               placeholder="사용자명을 입력하세요" required autofocus>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">사용자명 오류</span>
                </div>

                <div class="form-group">
                    <label for="displayName" class="form-label">표시 이름</label>
                    <div class="input-with-icon">
                        <i class="fas fa-id-badge input-icon"></i>
                        <input type="text" id="displayName" th:field="*{displayName}" class="form-control"
                               placeholder="이름을 입력하세요" required>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}">표시 이름 오류</span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">이메일</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                               placeholder="your@email.com" required>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">이메일 오류</span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" th:field="*{password}" class="form-control"
                               placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">비밀번호 오류</span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                               placeholder="비밀번호를 다시 입력하세요" required>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">비밀번호 확인 오류</span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-user-plus"></i> 회원가입
                </button>
            </form>

            <div class="auth-footer">
                <p>이미 계정이 있으신가요?
                    <a th:href="@{/login}" class="auth-link">로그인</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
