<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - SpaceNX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <i class="fas fa-rocket auth-brand-icon"></i>
                    <h1 class="auth-brand-text">SpaceNX</h1>
                </div>
                <p class="auth-subtitle">계정에 로그인하세요</p>
            </div>

            <div class="auth-alert auth-alert-error" th:if="${param.error}">
                <i class="fas fa-exclamation-circle"></i>
                <span>사용자명 또는 비밀번호가 올바르지 않습니다. 다시 시도해주세요.</span>
            </div>

            <div class="auth-alert auth-alert-success" th:if="${param.logout}">
                <i class="fas fa-check-circle"></i>
                <span>성공적으로 로그아웃되었습니다.</span>
            </div>

            <div class="auth-alert auth-alert-success" th:if="${param.registered}">
                <i class="fas fa-check-circle"></i>
                <span>회원가입이 완료되었습니다! 로그인해주세요.</span>
            </div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username" class="form-label">사용자명</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" class="form-control"
                               placeholder="사용자명을 입력하세요" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="비밀번호를 입력하세요" required>
                    </div>
                </div>

                <div class="form-group form-check-row">
                    <label class="form-check">
                        <input type="checkbox" name="remember-me" class="form-check-input">
                        <span class="form-check-label">로그인 유지</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
            </form>

            <div style="text-align: center; margin: 20px 0; position: relative;">
                <hr style="border-color: #444;">
                <span style="position: relative; top: -12px; background: var(--card-bg, #1e1e2e); padding: 0 12px; color: #888;">OR</span>
            </div>

            <a th:href="@{/oauth2/authorization/github}" class="btn btn-block btn-lg" style="background-color: #333; color: #fff; border: 1px solid #555; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                GitHub로 로그인
            </a>

            <div class="auth-footer">
                <p>계정이 없으신가요?
                    <a th:href="@{/register}" class="auth-link">회원가입</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
