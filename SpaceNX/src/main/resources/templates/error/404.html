<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다 - SpaceNX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon error-icon-404">
                <i class="fas fa-compass"></i>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">페이지를 찾을 수 없습니다</h2>
            <p class="error-message">
                요청하신 페이지를 찾을 수 없습니다.
                페이지가 삭제되었거나, 이름이 변경되었거나, 일시적으로 사용할 수 없습니다.
            </p>
            <div class="error-actions">
                <a th:href="@{/dashboard}" class="btn btn-primary">
                    <i class="fas fa-home"></i> 대시보드로 이동
                </a>
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> 뒤로 가기
                </a>
            </div>
        </div>
    </div>
</body>
</html>
