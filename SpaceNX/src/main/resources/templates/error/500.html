<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 서버 오류 - SpaceNX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon error-icon-500">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="error-code">500</h1>
            <h2 class="error-title">서버 내부 오류</h2>
            <p class="error-message">
                서버에서 오류가 발생했습니다. 잠시 후 다시 시도해주세요.
                문제가 지속되면 시스템 관리자에게 문의하세요.
            </p>
            <div class="error-details" th:if="${message != null}">
                <details>
                    <summary>기술적 세부 정보</summary>
                    <pre th:text="${message}">오류 세부 정보</pre>
                </details>
            </div>
            <div class="error-actions">
                <a th:href="@{/dashboard}" class="btn btn-primary">
                    <i class="fas fa-home"></i> 대시보드로 이동
                </a>
                <a href="javascript:location.reload()" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> 다시 시도
                </a>
            </div>
        </div>
    </div>
</body>
</html>
