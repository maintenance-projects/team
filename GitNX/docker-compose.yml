services:
  postgres:
    image: postgres:16-alpine
    container_name: gitnx-db
    environment:
      POSTGRES_DB: gitnx
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "ultari12#$"
    ports:
      - "5432:5432"
    volumes:
      - gitnx-pgdata:/var/lib/postgresql/data

volumes:
  gitnx-pgdata:
