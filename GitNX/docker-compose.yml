services:
  postgres:
    image: postgres:16-alpine
    container_name: gitnx-db
    environment:
      POSTGRES_DB: gitnx
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "ultari12#$"
    ports:
      - "5432:5432"
    volumes:
      - gitnx-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d gitnx"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gitnx-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gitnx
      DB_USERNAME: root
      DB_PASSWORD: "ultari12#$"
      GITNX_REPOS_PATH: /opt/gitnx/repos
      GITNX_CLONE_URL: http://localhost:9090/repo
    ports:
      - "9090:9090"
    volumes:
      - gitnx-repos:/opt/gitnx/repos

volumes:
  gitnx-pgdata:
  gitnx-repos:
