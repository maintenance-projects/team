<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/default}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Dashboard</h2>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newRepoModal">
                    + New Repository
                </button>
                <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#githubRepoModal">
                    Import Repository
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Repositories</h5>
            </div>
            <div class="list-group list-group-flush">
                <!-- Personal -->
                <div class="list-group-item bg-body-secondary py-2 px-3 d-flex align-items-center">
                    <strong>Personal</strong>
                    <span class="badge bg-secondary ms-2" th:text="${personalRepos.size()}"></span>
                </div>
                <div th:if="${personalRepos.isEmpty()}" class="list-group-item text-muted small ps-5">
                    No personal repositories
                </div>
                <a th:each="repo : ${personalRepos}"
                   th:href="@{/{owner}/{name}(owner=${repo.ownerUsername}, name=${repo.name})}"
                   class="list-group-item list-group-item-action ps-5">
                    <div>
                        <span th:text="${repo.name}" class="fw-bold"></span>
                        <small th:if="${repo.description}" class="text-muted ms-2" th:text="${repo.description}"></small>
                    </div>
                </a>

                <!-- Organizations -->
                <th:block th:each="entry : ${orgRepos}">
                    <a th:href="@{/org/{n}(n=${entry.key.name})}"
                       class="list-group-item bg-body-secondary py-2 px-3 d-flex align-items-center list-group-item-action">
                        <strong th:text="${entry.key.name}"></strong>
                        <span class="badge bg-secondary ms-2" th:text="${entry.value.size()}"></span>
                    </a>
                    <div th:if="${entry.value.isEmpty()}" class="list-group-item text-muted small ps-5">
                        No repositories
                    </div>
                    <a th:each="repo : ${entry.value}"
                       th:href="@{/{owner}/{name}(owner=${repo.ownerUsername}, name=${repo.name})}"
                       class="list-group-item list-group-item-action ps-5">
                        <div>
                            <span th:text="${repo.name}" class="fw-bold"></span>
                            <small th:if="${repo.description}" class="text-muted ms-2" th:text="${repo.description}"></small>
                        </div>
                    </a>
                </th:block>
            </div>
        </div>
    </div>

    <!-- New Repository 모달 -->
    <div class="modal fade" id="newRepoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create a new repository</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/new}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="newRepoName" class="form-label fw-bold">Repository name</label>
                            <input type="text" class="form-control" id="newRepoName" name="name"
                                   placeholder="my-project" required autofocus>
                            <small class="form-text text-muted">Letters, numbers, dots, hyphens and underscores only.</small>
                        </div>
                        <div class="mb-3">
                            <label for="newRepoDesc" class="form-label fw-bold">Description <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea class="form-control" id="newRepoDesc" name="description" rows="2"></textarea>
                        </div>
                        <div class="mb-3" th:if="${organizations != null and !organizations.isEmpty()}">
                            <label class="form-label fw-bold">Organization</label>
                            <select class="form-select" name="organizationId">
                                <option value="">Personal (me)</option>
                                <option th:each="org : ${organizations}"
                                        th:value="${org.id}"
                                        th:text="${org.name}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="newRepoDefaultBranch" class="form-label fw-bold">Default branch</label>
                            <input type="text" class="form-control" id="newRepoDefaultBranch" name="defaultBranch"
                                   value="main" style="max-width: 200px;">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="newRepoReadme" name="initWithReadme" value="true" checked>
                            <label class="form-check-label" for="newRepoReadme">Initialize with a README file</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Create repository</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- GitHub Import Modal (shared fragment) -->
    <div th:replace="~{fragments/github-import-modal :: githubImportModal('', '/dashboard', ${organizations}, true)}"></div>
</div>
</body>
</html>
