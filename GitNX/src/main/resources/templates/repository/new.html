<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>New Repository</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h2 class="mb-4">Create a new repository</h2>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/new}" method="post" th:object="${createRequest}">
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Repository name</label>
                        <input type="text" class="form-control" id="name"
                               th:field="*{name}" placeholder="my-project"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" autofocus>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}"></div>
                        <small class="form-text text-muted">
                            Letters, numbers, dots, hyphens and underscores only.
                        </small>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description <span class="text-muted fw-normal">(optional)</span></label>
                        <textarea class="form-control" id="description"
                                  th:field="*{description}" rows="3"
                                  placeholder="Short description of your repository"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="defaultBranch" class="form-label fw-bold">Default branch</label>
                        <input type="text" class="form-control" id="defaultBranch"
                               th:field="*{defaultBranch}" value="main" style="max-width: 200px;">
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="initWithReadme"
                                   th:field="*{initWithReadme}">
                            <label class="form-check-label" for="initWithReadme">
                                Initialize with a README file
                            </label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Create repository</button>
                        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
