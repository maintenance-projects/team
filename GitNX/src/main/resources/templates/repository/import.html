<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Import Repository</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h2 class="mb-4">Import a repository</h2>

                <!-- GitHub 계정 연동 상태 -->
                <div id="githubAccountSection" class="mb-3" style="display:none;">
                    <!-- 연동됨 -->
                    <div id="githubConnected" style="display:none;">
                        <div class="d-flex align-items-center justify-content-between p-3 border rounded mb-2">
                            <div class="d-flex align-items-center gap-2">
                                <img id="ghAvatar" src="" width="28" height="28" class="rounded-circle" alt="">
                                <span class="fw-semibold" id="ghLogin"></span>
                                <span class="badge bg-success-subtle text-success border border-success-subtle">연동됨</span>
                            </div>
                            <div class="d-flex gap-2">
                                <a href="/settings/github/link?returnUrl=/import" class="btn btn-sm btn-outline-secondary">계정 변경</a>
                                <form method="post" action="/settings/github/unlink" style="display:inline;">
                                    <input type="hidden" name="returnUrl" value="/import">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('GitHub 계정 연동을 해제하시겠습니까?')">연동 해제</button>
                                </form>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="button" class="btn btn-dark btn-lg" data-bs-toggle="modal" data-bs-target="#githubRepoModal">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16" style="vertical-align: text-bottom;">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                                GitHub에서 가져오기
                            </button>
                        </div>
                    </div>
                    <!-- 미연동 -->
                    <div id="githubNotConnected" style="display:none;">
                        <a href="/settings/github/link?returnUrl=/import" class="btn btn-dark btn-lg w-100">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16" style="vertical-align: text-bottom;">
                                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                            </svg>
                            GitHub 계정 연동하기
                        </a>
                    </div>
                </div>
                <!-- 로딩 중 placeholder -->
                <div id="githubAccountLoading" class="d-grid gap-2 mb-3">
                    <button class="btn btn-dark btn-lg" disabled>
                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                        GitHub 연동 확인 중...
                    </button>
                </div>

                <div class="text-center text-muted mb-3">
                    <hr class="d-inline-block w-25 align-middle">
                    <span class="mx-2">또는 URL 직접 입력</span>
                    <hr class="d-inline-block w-25 align-middle">
                </div>

                <form th:action="@{/import}" method="post" th:object="${importRequest}">
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                    </div>

                    <div class="mb-3">
                        <label for="cloneUrl" class="form-label fw-bold">Clone URL</label>
                        <input type="text" class="form-control" id="cloneUrl"
                               th:field="*{cloneUrl}"
                               placeholder="https://github.com/username/repository.git"
                               th:classappend="${#fields.hasErrors('cloneUrl')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('cloneUrl')}"
                             th:errors="*{cloneUrl}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Repository name <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="text" class="form-control" id="name"
                               th:field="*{name}" placeholder="auto-detected from URL">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description <span class="text-muted fw-normal">(optional)</span></label>
                        <textarea class="form-control" id="description"
                                  th:field="*{description}" rows="2"></textarea>
                    </div>

                    <div class="mb-3" th:if="${organizations != null and !organizations.isEmpty()}">
                        <label for="organizationId" class="form-label fw-bold">Organization</label>
                        <select class="form-select" id="organizationId" th:field="*{organizationId}">
                            <option value="">Personal (me)</option>
                            <option th:each="org : ${organizations}"
                                    th:value="${org.id}"
                                    th:text="${org.name}"></option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Import</button>
                        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- GitHub Repository 선택 모달 -->
    <div class="modal fade" id="githubRepoModal" tabindex="-1" aria-labelledby="githubRepoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="githubRepoModalLabel">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        GitHub Repositories
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- 검색 -->
                    <div class="p-3 border-bottom sticky-top bg-body" style="z-index:10">
                        <input type="text" class="form-control" id="ghSearchInput"
                               placeholder="Search repositories...">
                    </div>
                    <!-- 로딩 -->
                    <div id="ghLoading" class="text-center py-5">
                        <div class="spinner-border text-secondary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-2">GitHub 레포지토리 불러오는 중...</p>
                    </div>
                    <!-- 레포 목록 -->
                    <div id="ghRepoList" class="list-group list-group-flush" style="display:none;"></div>
                    <!-- 에러 -->
                    <div id="ghError" class="text-center py-5 text-danger" style="display:none;"></div>
                    <!-- 더보기 -->
                    <div id="ghLoadMore" class="text-center py-3 border-top" style="display:none;">
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="loadMoreRepos()">
                            더 불러오기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Import 진행 모달 -->
    <div class="modal fade" id="importingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-5">
                    <div class="spinner-border text-success mb-3" role="status">
                        <span class="visually-hidden">Importing...</span>
                    </div>
                    <h5 id="importingRepoName">Importing repository...</h5>
                    <p class="text-muted">잠시만 기다려주세요</p>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var allRepos = [];
        var currentPage = 1;
        var hasMore = true;

        // 페이지 로드 시 GitHub 계정 상태 확인
        fetch('/github/user')
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                document.getElementById('githubAccountLoading').style.display = 'none';
                document.getElementById('githubAccountSection').style.display = 'block';
                if (result.ok && result.data.login) {
                    document.getElementById('ghAvatar').src = result.data.avatar_url;
                    document.getElementById('ghLogin').textContent = result.data.login;
                    document.getElementById('githubConnected').style.display = 'block';
                } else {
                    document.getElementById('githubNotConnected').style.display = 'block';
                }
            })
            .catch(function() {
                document.getElementById('githubAccountLoading').style.display = 'none';
                document.getElementById('githubAccountSection').style.display = 'block';
                document.getElementById('githubNotConnected').style.display = 'block';
            });

        // 모달이 열릴 때 레포 목록 로드
        document.getElementById('githubRepoModal').addEventListener('show.bs.modal', function () {
            if (allRepos.length === 0) {
                currentPage = 1;
                loadRepos();
            }
        });

        // 검색 필터
        document.getElementById('ghSearchInput').addEventListener('input', function () {
            var query = this.value.toLowerCase();
            renderRepos(allRepos.filter(function (r) {
                return r.full_name.toLowerCase().includes(query)
                    || (r.description && r.description.toLowerCase().includes(query));
            }));
        });

        function loadRepos() {
            document.getElementById('ghLoading').style.display = 'block';
            document.getElementById('ghRepoList').style.display = 'none';
            document.getElementById('ghError').style.display = 'none';
            document.getElementById('ghLoadMore').style.display = 'none';

            fetchReposPage(1);
        }

        function fetchReposPage(page) {
            fetch('/github/repos?page=' + page + '&perPage=100')
                .then(function (res) {
                    if (!res.ok) throw new Error('Failed to fetch');
                    hasMore = res.headers.get('X-GitHub-Link') && res.headers.get('X-GitHub-Link').includes('rel="next"');
                    return res.json();
                })
                .then(function (repos) {
                    if (page === 1) allRepos = [];
                    allRepos = allRepos.concat(repos);
                    currentPage = page;

                    document.getElementById('ghLoading').style.display = 'none';
                    document.getElementById('ghRepoList').style.display = 'block';

                    var query = document.getElementById('ghSearchInput').value.toLowerCase();
                    var filtered = query ? allRepos.filter(function (r) {
                        return r.full_name.toLowerCase().includes(query);
                    }) : allRepos;
                    renderRepos(filtered);

                    if (hasMore) {
                        document.getElementById('ghLoadMore').style.display = 'block';
                    }
                })
                .catch(function (err) {
                    document.getElementById('ghLoading').style.display = 'none';
                    document.getElementById('ghError').style.display = 'block';
                    document.getElementById('ghError').textContent = 'GitHub 레포지토리를 불러올 수 없습니다: ' + err.message;
                });
        }

        function loadMoreRepos() {
            document.getElementById('ghLoadMore').style.display = 'none';
            fetchReposPage(currentPage + 1);
        }

        function renderRepos(repos) {
            var list = document.getElementById('ghRepoList');
            list.innerHTML = '';

            if (repos.length === 0) {
                list.innerHTML = '<div class="text-center py-4 text-muted">레포지토리를 찾을 수 없습니다</div>';
                return;
            }

            // Owner별로 그룹핑 (Personal 먼저, 나머지 Org는 알파벳 순)
            var groups = {};
            var personalOwner = null;
            repos.forEach(function (repo) {
                var ownerLogin = repo.owner.login;
                var ownerType = repo.owner.type; // "User" or "Organization"
                if (!groups[ownerLogin]) {
                    groups[ownerLogin] = {
                        login: ownerLogin,
                        avatar: repo.owner.avatar_url,
                        type: ownerType,
                        repos: []
                    };
                }
                groups[ownerLogin].repos.push(repo);
                if (ownerType === 'User') personalOwner = ownerLogin;
            });

            // Personal 먼저, 나머지 Org 알파벳 순 정렬
            var sortedKeys = Object.keys(groups).sort(function (a, b) {
                if (a === personalOwner) return -1;
                if (b === personalOwner) return 1;
                return a.toLowerCase().localeCompare(b.toLowerCase());
            });

            sortedKeys.forEach(function (ownerLogin) {
                var group = groups[ownerLogin];
                var isPersonal = group.type === 'User';

                // 그룹 헤더
                var header = document.createElement('div');
                header.className = 'list-group-item bg-body-secondary py-2 px-3 d-flex align-items-center sticky-top';
                header.style.cursor = 'pointer';
                header.style.top = '52px'; // 검색창 아래
                header.setAttribute('data-owner', ownerLogin);
                header.onclick = function () {
                    var items = list.querySelectorAll('[data-repo-owner="' + ownerLogin + '"]');
                    var chevron = header.querySelector('.gh-chevron');
                    var collapsed = items[0] && items[0].style.display === 'none';
                    items.forEach(function (el) { el.style.display = collapsed ? '' : 'none'; });
                    chevron.textContent = collapsed ? '\u25BE' : '\u25B8';
                };

                header.innerHTML =
                    '<span class="gh-chevron me-2" style="font-size:12px;width:12px;display:inline-block">\u25BE</span>' +
                    '<img src="' + group.avatar + '" width="22" height="22" class="rounded-circle me-2" alt="">' +
                    '<strong>' + escapeHtml(isPersonal ? 'Personal' : ownerLogin) + '</strong>' +
                    '<span class="badge bg-secondary ms-2">' + group.repos.length + '</span>';

                list.appendChild(header);

                // 레포 항목들
                group.repos.forEach(function (repo) {
                    var item = document.createElement('a');
                    item.href = '#';
                    item.className = 'list-group-item list-group-item-action py-2 ps-5';
                    item.setAttribute('data-repo-owner', ownerLogin);
                    item.onclick = function (e) {
                        e.preventDefault();
                        selectRepo(repo);
                    };

                    var visibilityBadge = repo.private
                        ? '<span class="badge bg-warning text-dark ms-1" style="font-size:10px">Private</span>'
                        : '<span class="badge bg-success ms-1" style="font-size:10px">Public</span>';

                    var description = repo.description
                        ? '<div class="text-muted small text-truncate">' + escapeHtml(repo.description) + '</div>'
                        : '';

                    var language = repo.language
                        ? '<span class="badge bg-light text-dark me-1" style="font-size:10px">' + repo.language + '</span>'
                        : '';

                    var updatedAt = repo.updated_at
                        ? '<small class="text-muted" style="font-size:11px">' + new Date(repo.updated_at).toLocaleDateString() + '</small>'
                        : '';

                    item.innerHTML =
                        '<div class="d-flex justify-content-between align-items-center">' +
                        '  <div class="me-2" style="min-width:0">' +
                        '    <div class="d-flex align-items-center">' +
                        '      <span>' + escapeHtml(repo.name) + '</span>' + visibilityBadge +
                        '    </div>' +
                             description +
                        '    <div class="mt-1">' + language + updatedAt + '</div>' +
                        '  </div>' +
                        '  <button class="btn btn-sm btn-outline-success flex-shrink-0">Import</button>' +
                        '</div>';

                    list.appendChild(item);
                });
            });
        }

        function selectRepo(repo) {
            // 모달 닫기
            var modal = bootstrap.Modal.getInstance(document.getElementById('githubRepoModal'));
            modal.hide();

            // Import 진행 모달 표시
            document.getElementById('importingRepoName').textContent = repo.full_name + ' importing...';
            var importingModal = new bootstrap.Modal(document.getElementById('importingModal'));
            importingModal.show();

            // hidden form으로 import 요청
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '/import';

            var fields = {
                cloneUrl: repo.clone_url,
                name: repo.name,
                description: repo.description || '',
                visibility: repo.private ? 'PRIVATE' : 'PUBLIC'
            };

            for (var key in fields) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }

            // CSRF 토큰 (기존 form에서 가져오기)
            var existingCsrf = document.querySelector('form input[name="_csrf"]');
            if (existingCsrf) {
                var csrfInput = document.createElement('input');
                csrfInput.type = 'hidden';
                csrfInput.name = '_csrf';
                csrfInput.value = existingCsrf.value;
                form.appendChild(csrfInput);
            }

            document.body.appendChild(form);
            form.submit();
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
    </script>
</div>
</body>
</html>
