<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title th:text="'Settings - ' + ${owner} + '/' + ${repo}">Settings</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div th:replace="~{fragments/repo-nav :: repoNav(${owner}, ${repo}, ${activeTab})}"></div>

        <h5 class="mb-3">Members</h5>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Add Member -->
        <div class="card mb-4">
            <div class="card-header">
                <strong>Add Member</strong>
            </div>
            <div class="card-body">
                <form th:action="@{/{o}/{r}/settings/members(o=${owner}, r=${repo})}" method="post">
                    <div class="d-flex gap-2 align-items-end">
                        <div class="flex-grow-1" style="position:relative; min-width:300px;">
                            <label class="form-label small">Username</label>
                            <input type="text" id="userSearchInput" class="form-control form-control-sm"
                                   placeholder="Search by ID or name..." autocomplete="off"
                                   oninput="searchUsers(this.value)" onfocus="searchUsers(this.value)">
                            <input type="hidden" name="username" id="selectedUsername">
                            <div id="userDropdown" class="dropdown-menu w-100" style="display:none; max-height:250px; overflow-y:auto;"></div>
                        </div>
                        <div>
                            <label class="form-label small">Role</label>
                            <select name="role" class="form-select form-select-sm">
                                <option value="MEMBER" selected>Member</option>
                                <option value="OWNER">Owner</option>
                            </select>
                        </div>
                        <div>
                            <button type="submit" class="btn btn-success btn-sm">Add Member</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Current Members -->
        <div class="card">
            <div class="card-header d-flex align-items-center">
                <strong>Current Members</strong>
                <span class="badge bg-secondary ms-2" th:text="${members.size()}"></span>
            </div>
            <table class="table mb-0">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th style="width: 120px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member : ${members}">
                    <td class="align-middle">
                        <strong th:text="${member.user.username}"></strong>
                        <small class="text-muted ms-2"
                               th:if="${member.user.displayName != null and member.user.displayName != member.user.username}"
                               th:text="${member.user.displayName}"></small>
                    </td>
                    <td class="align-middle">
                        <span th:if="${member.role.name() == 'OWNER'}"
                              class="badge bg-warning text-dark">Owner</span>
                        <span th:unless="${member.role.name() == 'OWNER'}"
                              class="badge bg-info">Member</span>
                    </td>
                    <td class="align-middle">
                        <form th:unless="${member.role.name() == 'OWNER'}"
                              th:action="@{/{o}/{r}/settings/members/{mid}/delete(o=${owner}, r=${repo}, mid=${member.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Remove this member?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
                        </form>
                        <span th:if="${member.role.name() == 'OWNER'}" class="text-muted small">&mdash;</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Danger Zone -->
        <div class="mt-5">
            <h5 class="text-danger mb-3">Danger Zone</h5>
            <div class="card border-danger">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <strong>Delete this repository</strong>
                        <p class="text-muted small mb-0">Once you delete a repository, there is no going back.</p>
                    </div>
                    <form th:action="@{/{o}/{r}/settings/delete(o=${owner}, r=${repo})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this repository?\nThis action cannot be undone.')">
                        <button type="submit" class="btn btn-danger btn-sm">Delete this repository</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        var searchTimer = null;

        function searchUsers(query) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function () {
                fetch('/settings/users/search?q=' + encodeURIComponent(query))
                    .then(function (r) { return r.json(); })
                    .then(function (users) { renderDropdown(users); })
                    .catch(function () { hideDropdown(); });
            }, 200);
        }

        function renderDropdown(users) {
            var dd = document.getElementById('userDropdown');
            dd.innerHTML = '';
            if (users.length === 0) {
                dd.innerHTML = '<div class="dropdown-item text-muted">No users found</div>';
                dd.style.display = 'block';
                return;
            }
            users.forEach(function (u) {
                var item = document.createElement('a');
                item.href = '#';
                item.className = 'dropdown-item py-2';
                item.innerHTML = '<strong>' + escapeHtml(u.user_id) + '</strong>' +
                    (u.user_name ? '<small class="text-muted ms-2">' + escapeHtml(u.user_name) + '</small>' : '') +
                    (u.email ? '<small class="text-muted ms-2">' + escapeHtml(u.email) + '</small>' : '');
                item.onclick = function (e) {
                    e.preventDefault();
                    selectUser(u);
                };
                dd.appendChild(item);
            });
            dd.style.display = 'block';
        }

        function selectUser(u) {
            document.getElementById('userSearchInput').value = u.user_id + (u.user_name ? ' (' + u.user_name + ')' : '');
            document.getElementById('selectedUsername').value = u.user_id;
            hideDropdown();
        }

        function hideDropdown() {
            document.getElementById('userDropdown').style.display = 'none';
        }

        // 외부 클릭 시 드롭다운 닫기
        document.addEventListener('click', function (e) {
            if (!e.target.closest('#userSearchInput') && !e.target.closest('#userDropdown')) {
                hideDropdown();
            }
        });

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
    </script>
</div>
</body>
</html>
