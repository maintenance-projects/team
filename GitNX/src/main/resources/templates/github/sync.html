<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>GitHub 전체 동기화</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4" style="max-width: 800px;">
        <h3 class="mb-1">GitHub 전체 동기화</h3>
        <p class="text-muted mb-4">GitHub의 모든 Organization, Repository, Member를 GitNX로 가져옵니다.</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card border-warning mb-4">
            <div class="card-body">
                <strong>⚠ 주의사항</strong>
                <ul class="mb-0 mt-2 small">
                    <li>레포지토리 수에 따라 수 분이 걸릴 수 있습니다. 완료될 때까지 페이지를 닫지 마세요.</li>
                    <li>이미 존재하는 Organization / Repository는 건너뜁니다.</li>
                    <li>GitNX에 가입되지 않은 멤버는 추가되지 않을 수 있습니다.</li>
                </ul>
            </div>
        </div>

        <form method="post" th:action="@{/github/sync}" onsubmit="showProgress()">
            <button type="submit" id="syncBtn" class="btn btn-dark btn-lg">
                GitHub에서 전체 동기화 시작
            </button>
        </form>

        <div id="progressMsg" class="mt-3 text-muted" style="display:none;">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
            동기화 중입니다. 레포지토리가 많으면 오래 걸릴 수 있어요...
        </div>

        <div th:if="${logs}" class="mt-4">
            <h5>동기화 결과</h5>
            <div class="card">
                <div class="card-body p-0">
                    <pre class="p-3 mb-0" style="font-size:13px; max-height:600px; overflow-y:auto; background:transparent;"><th:block th:each="line : ${logs}" th:text="${line + '\n'}"></th:block></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showProgress() {
            document.getElementById('syncBtn').disabled = true;
            document.getElementById('progressMsg').style.display = 'block';
        }
    </script>
</div>
</body>
</html>
