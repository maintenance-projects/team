<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>Labels</title></head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div th:replace="~{fragments/repo-nav :: repoNav(${owner}, ${repo}, ${activeTab})}"></div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Labels</h4>
        </div>

        <!-- Create label form -->
        <div class="card mb-3">
            <div class="card-body">
                <form th:action="@{/{o}/{r}/labels(o=${owner}, r=${repo})}" method="post" class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control form-control-sm" name="name" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Color</label>
                        <input type="color" class="form-control form-control-sm form-control-color" name="color" value="#0d6efd">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control form-control-sm" name="description">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success btn-sm">Create label</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Label list -->
        <div class="card">
            <div class="list-group list-group-flush">
                <div th:each="label : ${labels}" class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <span class="issue-label" th:style="'background-color:' + ${label.color}"
                              th:text="${label.name}"></span>
                        <small class="text-muted ms-2" th:text="${label.description}"></small>
                    </div>
                    <form th:action="@{/{o}/{r}/labels/{id}/delete(o=${owner}, r=${repo}, id=${label.id})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                    </form>
                </div>
                <div th:if="${labels.isEmpty()}" class="list-group-item text-center text-muted py-4">
                    No labels yet.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
