<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Git Authentication</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5 col-lg-4">
            <div class="card gn-auth-card">
                <div class="card-body p-4">

                    <!-- 인증 완료 상태 -->
                    <div th:if="${completed}">
                        <h3 class="card-title text-center mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#198754" viewBox="0 0 16 16">
                                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                            </svg>
                        </h3>
                        <h4 class="text-center text-success mb-3">Git 인증 완료!</h4>
                        <p class="text-center text-muted mb-1">
                            <strong th:text="${username}"></strong> (으)로 인증되었습니다.
                        </p>
                        <p class="text-center text-muted">
                            이 창을 닫아도 됩니다. Git 작업이 자동으로 계속됩니다.
                        </p>
                    </div>

                    <!-- 에러 상태 (세션 만료 등) -->
                    <div th:if="${error}" th:unless="${sessionId}">
                        <h3 class="card-title text-center mb-4">Git Authentication</h3>
                        <div class="alert alert-danger" th:text="${error}"></div>
                    </div>

                    <!-- 인증 대기 상태 -->
                    <div th:if="${sessionId}" th:unless="${completed}">
                        <h3 class="card-title text-center mb-4">
                            <span class="gn-logo">Git</span>Neo 인증
                        </h3>
                        <p class="text-muted text-center mb-4">
                            Git 작업을 위해 로그인해주세요.
                        </p>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <!-- GitHub OAuth 로그인 -->
                        <a th:href="@{/oauth2/authorization/github}" class="btn btn-dark w-100 mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="me-2" viewBox="0 0 16 16" style="vertical-align: text-bottom;">
                                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                            </svg>
                            GitHub로 로그인
                        </a>

                        <div class="text-center my-3">
                            <hr>
                            <span class="text-muted">OR</span>
                        </div>

                        <!-- 일반 로그인 -->
                        <form th:action="@{'/git-auth/' + ${sessionId} + '/login'}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username or Email</label>
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="Enter username or email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter password" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Login</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
