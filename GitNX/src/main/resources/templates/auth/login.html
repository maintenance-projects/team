<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5 col-lg-4">
            <div class="card gn-auth-card">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">
                        <span class="gn-logo">Git</span>Neo Login
                    </h3>

                    <div th:if="${param.error}" class="alert alert-danger">
                        GitHub 로그인에 실패했습니다. 다시 시도해주세요.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        로그아웃 되었습니다.
                    </div>

                    <p class="text-muted text-center mb-4">
                        GitHub 계정으로 로그인하세요. 계정이 없으면 자동으로 생성됩니다.
                    </p>

                    <a th:href="@{/oauth2/authorization/github}" class="btn btn-dark w-100 btn-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="me-2" viewBox="0 0 16 16" style="vertical-align: text-bottom;">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Sign in with GitHub
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
