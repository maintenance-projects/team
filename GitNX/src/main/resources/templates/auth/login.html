<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5 col-lg-4">
            <div class="card gn-auth-card">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">
                        <span class="gn-logo">Git</span>Neo Login
                    </h3>

                    <div th:if="${param.error}" class="alert alert-danger">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        로그아웃 되었습니다.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Workbench ID</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Enter your Workbench ID" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Login</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
