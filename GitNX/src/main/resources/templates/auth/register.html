<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Register</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card gn-auth-card">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">
                        <span class="gn-logo">Git</span>Neo Register
                    </h3>

                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username"
                                   th:field="*{username}" placeholder="e.g. johndoe"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                            <small class="form-text text-muted">Letters, numbers, hyphens and underscores only</small>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email"
                                   th:field="*{email}" placeholder="you@example.com"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="displayName" class="form-label">Display Name (optional)</label>
                            <input type="text" class="form-control" id="displayName"
                                   th:field="*{displayName}" placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password"
                                   th:field="*{password}" placeholder="Minimum 6 characters"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="passwordConfirm" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="passwordConfirm"
                                   th:field="*{passwordConfirm}"
                                   th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordConfirm')}"
                                 th:errors="*{passwordConfirm}"></div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Register</button>
                    </form>

                    <div class="text-center mt-3">
                        <span>Already have an account? </span>
                        <a th:href="@{/login}">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
