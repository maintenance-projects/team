<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:fragment="repoNav(owner, repo, activeTab)">
    <div class="d-flex align-items-center mb-3">
        <h4 class="mb-0">
            <a th:href="@{/{o}(o=${owner})}" th:text="${owner}" class="text-muted text-decoration-none"></a>
            <span class="text-muted">/</span>
            <a th:href="@{/{o}/{r}(o=${owner}, r=${repo})}" th:text="${repo}" class="text-decoration-none fw-bold"></a>
        </h4>
    </div>
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'code'} ? 'active'"
               th:href="@{/{o}/{r}(o=${owner}, r=${repo})}">Code</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeTab == 'commits'} ? 'active'"
               th:href="@{/{o}/{r}/commits/{b}(o=${owner}, r=${repo}, b=${currentBranch ?: 'main'})}">Commits</a>
        </li>
        <li class="nav-item"
            th:if="${#authentication != null and #authentication.name == owner}">
            <a class="nav-link" th:classappend="${activeTab == 'settings'} ? 'active'"
               th:href="@{/{o}/{r}/settings(o=${owner}, r=${repo})}">Settings</a>
        </li>
    </ul>
</div>
</html>
