<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    GitHub Import Modal Fragment
    Parameters:
    - orgId: Organization ID (빈 값이면 Personal)
    - linkReturnUrl: GitHub 연동/해제 후 돌아올 URL
    - organizations: Organization 목록 (footer 드롭다운, null이면 숨김)
    - showOrgSelect: Organization 선택 드롭다운 표시 여부
-->
<div th:fragment="githubImportModal(orgId, linkReturnUrl, organizations, showOrgSelect)">

    <!-- GitHub Import 모달 -->
    <div class="modal fade" id="githubRepoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Import from GitHub
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <!-- GitHub 계정 정보 -->
                <div class="px-3 py-2 border-bottom bg-body-secondary">
                    <div id="ghAccountLoading" class="text-muted small">
                        <span class="spinner-border spinner-border-sm me-1" role="status"></span> 계정 확인 중...
                    </div>
                    <div id="ghAccountConnected" class="d-flex align-items-center justify-content-between" style="display:none !important;">
                        <div class="d-flex align-items-center gap-2">
                            <img id="ghAvatar" src="" width="22" height="22" class="rounded-circle" alt="">
                            <span class="fw-semibold small" id="ghLogin"></span>
                            <span class="badge bg-success-subtle text-success border border-success-subtle" style="font-size:11px;">연동됨</span>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/settings/github/link(returnUrl=${linkReturnUrl})}"
                               class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:12px;">계정 변경</a>
                            <form method="post" action="/settings/github/unlink" style="display:inline;">
                                <input type="hidden" name="returnUrl" th:value="${linkReturnUrl}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2" style="font-size:12px;"
                                        onclick="return confirm('GitHub 계정 연동을 해제하시겠습니까?')">연동 해제</button>
                            </form>
                        </div>
                    </div>
                    <div id="ghAccountNotConnected" class="d-flex align-items-center justify-content-between" style="display:none !important;">
                        <span class="text-muted small">GitHub 계정이 연동되지 않았습니다.</span>
                        <a th:href="@{/settings/github/link(returnUrl=${linkReturnUrl})}"
                           class="btn btn-sm btn-dark py-0 px-2" style="font-size:12px;">연동하기</a>
                    </div>
                </div>
                <div class="modal-body p-0">
                    <div class="p-3 border-bottom sticky-top bg-body" style="z-index:10">
                        <input type="text" class="form-control" id="ghSearchInput" placeholder="Search repositories...">
                    </div>
                    <div id="ghLoading" class="text-center py-5">
                        <div class="spinner-border text-secondary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-2">GitHub 레포지토리 불러오는 중...</p>
                    </div>
                    <div id="ghRepoList" class="list-group list-group-flush" style="display:none;"></div>
                    <div id="ghError" class="text-center py-5" style="display:none;">
                        <p id="ghErrorMsg" class="text-danger"></p>
                        <div id="ghLinkBtn" style="display:none;">
                            <p class="text-muted">GitHub 계정을 연동하면 레포지토리를 불러올 수 있습니다.</p>
                            <a th:href="@{/settings/github/link(returnUrl=${linkReturnUrl})}" class="btn btn-dark">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github me-1" viewBox="0 0 16 16">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                                GitHub 계정 연동하기
                            </a>
                        </div>
                    </div>
                    <div id="ghLoadMore" class="text-center py-3 border-top" style="display:none;">
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="loadMoreRepos()">더 불러오기</button>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <div th:if="${showOrgSelect and organizations != null and !organizations.isEmpty()}"
                         class="d-flex align-items-center gap-2">
                        <label class="small text-muted mb-0">Organization:</label>
                        <select id="importOrgSelect" class="form-select form-select-sm" style="width:auto;">
                            <option value="">Personal</option>
                            <option th:each="o : ${organizations}" th:value="${o.id}" th:text="${o.name}"
                                    th:selected="${o.id == orgId}"></option>
                        </select>
                    </div>
                    <div th:unless="${showOrgSelect and organizations != null and !organizations.isEmpty()}"></div>
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import 진행 모달 -->
    <div class="modal fade" id="importingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-5">
                    <div class="spinner-border text-success mb-3" role="status">
                        <span class="visually-hidden">Importing...</span>
                    </div>
                    <h5 id="importingRepoName">Importing repository...</h5>
                    <p class="text-muted">잠시만 기다려주세요</p>
                </div>
            </div>
        </div>
    </div>

    <input type="hidden" id="fixedOrgIdValue" th:value="${orgId}">
    <script>
        var allRepos = [];
        var currentPage = 1;
        var hasMore = true;

        document.getElementById('githubRepoModal').addEventListener('show.bs.modal', function () {
            currentPage = 1; allRepos = []; loadRepos();

            // 계정 정보 초기화 후 조회
            document.getElementById('ghAccountLoading').style.display = 'block';
            document.getElementById('ghAccountConnected').style.display = 'none';
            document.getElementById('ghAccountNotConnected').style.display = 'none';

            fetch('/github/user')
                .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
                .then(function(result) {
                    document.getElementById('ghAccountLoading').style.display = 'none';
                    if (result.ok && result.data.login) {
                        document.getElementById('ghAvatar').src = result.data.avatar_url;
                        document.getElementById('ghLogin').textContent = result.data.login;
                        document.getElementById('ghAccountConnected').style.display = 'flex';
                    } else {
                        document.getElementById('ghAccountNotConnected').style.display = 'flex';
                    }
                })
                .catch(function() {
                    document.getElementById('ghAccountLoading').style.display = 'none';
                    document.getElementById('ghAccountNotConnected').style.display = 'flex';
                });
        });

        document.getElementById('ghSearchInput').addEventListener('input', function () {
            var q = this.value.toLowerCase();
            renderRepos(allRepos.filter(function (r) {
                return r.full_name.toLowerCase().includes(q) || (r.description && r.description.toLowerCase().includes(q));
            }));
        });

        function loadRepos() {
            document.getElementById('ghLoading').style.display = 'block';
            document.getElementById('ghRepoList').style.display = 'none';
            document.getElementById('ghError').style.display = 'none';
            document.getElementById('ghLoadMore').style.display = 'none';
            fetchReposPage(1);
        }

        function fetchReposPage(page) {
            fetch('/github/repos?page=' + page + '&perPage=100')
                .then(function (res) {
                    if (res.status === 400) throw { noToken: true };
                    if (!res.ok) throw new Error('Failed to fetch');
                    hasMore = (res.headers.get('X-GitHub-Link') || '').includes('rel="next"');
                    return res.json();
                })
                .then(function (repos) {
                    if (page === 1) allRepos = [];
                    allRepos = allRepos.concat(repos);
                    currentPage = page;
                    document.getElementById('ghLoading').style.display = 'none';
                    document.getElementById('ghRepoList').style.display = 'block';
                    var q = document.getElementById('ghSearchInput').value.toLowerCase();
                    renderRepos(q ? allRepos.filter(function (r) { return r.full_name.toLowerCase().includes(q); }) : allRepos);
                    if (hasMore) document.getElementById('ghLoadMore').style.display = 'block';
                })
                .catch(function (err) {
                    document.getElementById('ghLoading').style.display = 'none';
                    document.getElementById('ghError').style.display = 'block';
                    if (err.noToken) {
                        document.getElementById('ghErrorMsg').textContent = 'GitHub 계정이 연동되어 있지 않습니다.';
                        document.getElementById('ghLinkBtn').style.display = 'block';
                    } else {
                        document.getElementById('ghErrorMsg').textContent = '불러올 수 없습니다: ' + (err.message || '');
                        document.getElementById('ghLinkBtn').style.display = 'none';
                    }
                });
        }

        function loadMoreRepos() {
            document.getElementById('ghLoadMore').style.display = 'none';
            fetchReposPage(currentPage + 1);
        }

        function renderRepos(repos) {
            var list = document.getElementById('ghRepoList');
            list.innerHTML = '';
            if (!repos.length) {
                list.innerHTML = '<div class="text-center py-4 text-muted">레포지토리를 찾을 수 없습니다</div>';
                return;
            }
            var groups = {}, po = null;
            repos.forEach(function (r) {
                var o = r.owner.login, t = r.owner.type;
                if (!groups[o]) groups[o] = { login: o, avatar: r.owner.avatar_url, type: t, repos: [] };
                groups[o].repos.push(r);
                if (t === 'User') po = o;
            });
            Object.keys(groups).sort(function (a, b) {
                if (a === po) return -1;
                if (b === po) return 1;
                return a.localeCompare(b);
            }).forEach(function (ol) {
                var g = groups[ol], ip = g.type === 'User';
                var h = document.createElement('div');
                h.className = 'list-group-item bg-body-secondary py-2 px-3 d-flex align-items-center';
                h.style.cssText = 'cursor:pointer;position:sticky;top:52px;z-index:5;';
                h.onclick = function () {
                    var its = list.querySelectorAll('[data-ro="' + ol + '"]');
                    var ch = h.querySelector('.chv');
                    var c = its[0] && its[0].style.display === 'none';
                    its.forEach(function (e) { e.style.display = c ? '' : 'none'; });
                    ch.textContent = c ? '\u25BE' : '\u25B8';
                };
                h.innerHTML = '<span class="chv me-2" style="font-size:12px;width:12px;display:inline-block">\u25BE</span>' +
                    '<img src="' + g.avatar + '" width="22" height="22" class="rounded-circle me-2" alt="">' +
                    '<strong>' + esc(ip ? 'Personal' : ol) + '</strong>' +
                    '<span class="badge bg-secondary ms-2">' + g.repos.length + '</span>';
                list.appendChild(h);
                g.repos.forEach(function (repo) {
                    var it = document.createElement('a');
                    it.href = '#';
                    it.className = 'list-group-item list-group-item-action py-2 ps-5';
                    it.setAttribute('data-ro', ol);
                    it.onclick = function (e) { e.preventDefault(); selectRepo(repo); };
                    var desc = repo.description ? '<div class="text-muted small text-truncate">' + esc(repo.description) + '</div>' : '';
                    var lang = repo.language ? '<span class="badge bg-light text-dark me-1" style="font-size:10px">' + repo.language + '</span>' : '';
                    var upd = repo.updated_at ? '<small class="text-muted" style="font-size:11px">' + new Date(repo.updated_at).toLocaleDateString() + '</small>' : '';
                    it.innerHTML = '<div class="d-flex justify-content-between align-items-center">' +
                        '<div class="me-2" style="min-width:0"><span>' + esc(repo.name) + '</span>' + desc +
                        '<div class="mt-1">' + lang + upd + '</div></div>' +
                        '<button class="btn btn-sm btn-outline-success flex-shrink-0">Import</button></div>';
                    list.appendChild(it);
                });
            });
        }

        function selectRepo(repo) {
            try {
                bootstrap.Modal.getInstance(document.getElementById('githubRepoModal')).hide();
                document.getElementById('importingRepoName').textContent = repo.full_name + ' importing...';
                new bootstrap.Modal(document.getElementById('importingModal')).show();

                var csrfInput = document.querySelector('input[name="_csrf"]');
                var csrfToken = csrfInput ? csrfInput.value : '';
                if (!csrfToken) { var m = document.cookie.match(/(^| )XSRF-TOKEN=([^;]+)/); if (m) csrfToken = decodeURIComponent(m[2]); }

                var orgSelect = document.getElementById('importOrgSelect');
                var fixedVal = document.getElementById('fixedOrgIdValue').value;
                var orgId = fixedVal || (orgSelect ? orgSelect.value : '');

                var body = 'cloneUrl=' + encodeURIComponent(repo.clone_url)
                    + '&name=' + encodeURIComponent(repo.name)
                    + '&description=' + encodeURIComponent(repo.description || '')
                    + (orgId ? '&organizationId=' + encodeURIComponent(orgId) : '')
                    + '&_csrf=' + encodeURIComponent(csrfToken);

                fetch('/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-XSRF-TOKEN': csrfToken },
                    body: body,
                    redirect: 'follow'
                }).then(function (r) {
                    if (r.redirected) { window.location.href = r.url; }
                    else { r.text().then(function (html) {
                        bootstrap.Modal.getInstance(document.getElementById('importingModal')).hide();
                        var tmp = document.createElement('div'); tmp.innerHTML = html;
                        var el = tmp.querySelector('.alert-danger span') || tmp.querySelector('.alert-danger');
                        alert(el ? el.textContent.trim() : 'Import에 실패했습니다.');
                    }); }
                }).catch(function (e) {
                    bootstrap.Modal.getInstance(document.getElementById('importingModal')).hide();
                    alert('Import 실패: ' + e);
                });
            } catch (e) {
                alert('Import JS 에러: ' + e.message);
            }
        }

        function esc(t) { var d = document.createElement('div'); d.appendChild(document.createTextNode(t)); return d.innerHTML; }
    </script>
</div>
</html>
