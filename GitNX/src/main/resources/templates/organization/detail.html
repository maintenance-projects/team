<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title th:text="${org.name} + ' - Organization'">Organization</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 th:text="${org.name}"></h2>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#newRepoModal">
                    + New Repository
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#githubRepoModal">
                    Import Repository
                </button>
            </div>
        </div>
        <p th:if="${org.description}" class="text-muted" th:text="${org.description}"></p>

        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/org/{n}(n=${org.name})}">Repositories</a>
            </li>
            <li class="nav-item" th:if="${isOwner}">
                <a class="nav-link" th:href="@{/org/{n}/settings(n=${org.name})}">Settings</a>
            </li>
        </ul>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>Repositories</strong>
            </div>
            <div class="card-body">
                <div th:if="${repositories == null or repositories.isEmpty()}"
                     class="text-center text-muted py-4">
                    <p>No repositories in this organization yet.</p>
                    <button type="button" class="btn btn-outline-success btn-sm" data-bs-toggle="modal" data-bs-target="#newRepoModal">
                        Create a repository
                    </button>
                </div>
                <div th:if="${repositories != null and !repositories.isEmpty()}"
                     class="list-group list-group-flush">
                    <a th:each="repo : ${repositories}"
                       th:href="@{/{owner}/{name}(owner=${repo.ownerUsername}, name=${repo.name})}"
                       class="list-group-item list-group-item-action">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">
                                    <span th:text="${repo.ownerUsername}" class="text-muted"></span>
                                    /
                                    <span th:text="${repo.name}" class="fw-bold"></span>
                                </h6>
                                <small th:text="${repo.description}" class="text-muted"></small>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- New Repository 모달 (Organization 자동 선택) -->
    <div class="modal fade" id="newRepoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create a new repository</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/new}" method="post">
                    <input type="hidden" name="organizationId" th:value="${org.id}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Organization</label>
                            <input type="text" class="form-control" th:value="${org.name}" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="newRepoName" class="form-label fw-bold">Repository name</label>
                            <input type="text" class="form-control" id="newRepoName" name="name"
                                   placeholder="my-project" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="newRepoDesc" class="form-label fw-bold">Description <span class="text-muted fw-normal">(optional)</span></label>
                            <textarea class="form-control" id="newRepoDesc" name="description" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="newRepoBranch" class="form-label fw-bold">Default branch</label>
                            <input type="text" class="form-control" id="newRepoBranch" name="defaultBranch"
                                   value="main" style="max-width:200px;">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="newRepoReadme" name="initWithReadme" value="true" checked>
                            <label class="form-check-label" for="newRepoReadme">Initialize with a README file</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Create repository</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- GitHub Import Modal (shared fragment, org 고정) -->
    <div th:replace="~{fragments/github-import-modal :: githubImportModal(${org.id}, '/org/' + ${org.name}, null, false)}"></div>
</div>
</body>
</html>
