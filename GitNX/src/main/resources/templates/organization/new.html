<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>New Organization</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h2 class="mb-4">Create a new organization</h2>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/organizations/new}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Organization name</label>
                        <input type="text" class="form-control" id="name" name="name"
                               placeholder="my-organization" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description <span class="text-muted fw-normal">(optional)</span></label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Create organization</button>
                        <a th:href="@{/organizations}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
