<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="'New Merge Request - ' + ${owner} + '/' + ${repo}">New MR</title></head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div th:replace="~{fragments/repo-nav :: repoNav(${owner}, ${repo}, ${activeTab})}"></div>

        <h5 class="mb-3">New Merge Request</h5>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/{o}/{r}/merge-requests(o=${owner}, r=${repo})}" method="post">
                    <div class="row mb-3">
                        <div class="col-md-5">
                            <label class="form-label">Source branch</label>
                            <select name="sourceBranch" class="form-select" required>
                                <option value="">Select source branch...</option>
                                <option th:each="branch : ${branches}" th:value="${branch.name}"
                                        th:text="${branch.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end justify-content-center pb-2">
                            <span class="text-muted">&rarr;</span>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Target branch</label>
                            <select name="targetBranch" class="form-select" required>
                                <option value="">Select target branch...</option>
                                <option th:each="branch : ${branches}" th:value="${branch.name}"
                                        th:text="${branch.name}" th:selected="${branch.isDefault()}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" required
                               placeholder="Merge request title">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="6"
                                  placeholder="Describe the changes..."></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/{o}/{r}/merge-requests(o=${owner}, r=${repo})}"
                           class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Create merge request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
